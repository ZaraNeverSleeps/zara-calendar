<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zara's Appointment Book</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--green:#1D9E75;--green-light:#E1F5EE;--green-dark:#085041;--red:#E24B4A;--gray-50:#F8F8F7;--gray-100:#EFEFED;--gray-200:#DDDCDA;--gray-400:#999896;--gray-700:#444441;--gray-900:#1A1A18;--judy:#534AB7;--mark:#185FA5;--andrea:#993C1D;--nicole:#993556;--radius:8px;--radius-lg:12px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--gray-50);color:var(--gray-900);min-height:100vh}
header{background:#fff;border-bottom:1px solid var(--gray-200);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:32px;height:32px;border-radius:8px;background:var(--green);display:flex;align-items:center;justify-content:center}
.logo-text{font-size:15px;font-weight:600;color:var(--gray-900)}
.logo-sub{font-size:11px;color:var(--gray-400);margin-top:1px}
.status-pill{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--gray-400);background:var(--gray-50);border:1px solid var(--gray-200);border-radius:20px;padding:4px 10px}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--gray-400)}
.status-dot.ok{background:var(--green)}
.status-dot.err{background:var(--red)}
main{padding:20px 24px;max-width:1200px;margin:0 auto}
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.week-nav{display:flex;align-items:center;gap:8px}
.week-label{font-size:15px;font-weight:500;min-width:200px;text-align:center}
.btn{border:1px solid var(--gray-200);background:#fff;border-radius:var(--radius);padding:7px 14px;font-size:13px;cursor:pointer;color:var(--gray-700)}
.btn:hover{background:var(--gray-50)}
.btn-icon{padding:7px 10px}
.legend{display:flex;gap:12px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--gray-400)}
.legend-dot{width:10px;height:10px;border-radius:3px}
.grid-wrap{overflow-x:auto;border-radius:var(--radius-lg);border:1px solid var(--gray-200);background:#fff}
.cal-grid{display:grid;grid-template-columns:68px repeat(6,1fr);min-width:680px}
.cell{border-right:1px solid var(--gray-100);border-bottom:1px solid var(--gray-100)}
.corner-cell{background:var(--gray-50);border-right:1px solid var(--gray-200);border-bottom:1px solid var(--gray-200)}
.day-header{background:var(--gray-50);padding:10px 8px 8px;text-align:center;border-right:1px solid var(--gray-200);border-bottom:1px solid var(--gray-200)}
.day-name{font-size:10px;font-weight:600;color:var(--gray-400);text-transform:uppercase;letter-spacing:0.6px}
.day-num{font-size:18px;font-weight:500;margin:2px 0}
.day-num.today{color:var(--green)}
.day-count{font-size:10px;color:var(--gray-400)}
.time-cell{background:var(--gray-50);padding:0 8px;font-size:10px;color:var(--gray-400);display:flex;align-items:center;justify-content:flex-end;border-right:1px solid var(--gray-200);border-bottom:1px solid var(--gray-100);height:52px}
.slot{height:52px;padding:3px;cursor:pointer;transition:background 0.1s}
.slot:hover{background:#F0FBF7}
.slot.lunch{background:var(--gray-50);cursor:default;display:flex;align-items:center;justify-content:center}
.slot.lunch:hover{background:var(--gray-50)}
.slot.lunch span{font-size:10px;color:var(--gray-400)}
.chip{height:100%;border-radius:5px;padding:4px 7px;display:flex;flex-direction:column;justify-content:center;overflow:hidden;cursor:pointer;color:#fff}
.chip-name{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chip-sub{font-size:10px;opacity:0.82;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.chip.judy{background:var(--judy)}.chip.mark{background:var(--mark)}.chip.andrea{background:var(--andrea)}.chip.nicole{background:var(--nicole)}.chip.other{background:var(--green)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
.modal{background:#fff;border-radius:var(--radius-lg);border:1px solid var(--gray-200);padding:20px;width:360px;max-width:100%;box-shadow:0 8px 32px rgba(0,0,0,0.08)}
.modal-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px}
.modal-title{font-size:15px;font-weight:600}
.modal-sub{font-size:12px;color:var(--gray-400);margin-top:3px}
.close-btn{background:none;border:none;font-size:18px;color:var(--gray-400);cursor:pointer;padding:0 4px}
.field{margin-bottom:12px}
.field label{font-size:11px;font-weight:600;color:var(--gray-400);text-transform:uppercase;letter-spacing:0.4px;display:block;margin-bottom:5px}
.field input,.field select{width:100%;padding:9px 11px;border:1px solid var(--gray-200);border-radius:var(--radius);font-size:14px;color:var(--gray-900);background:#fff;outline:none}
.field input:focus,.field select:focus{border-color:var(--green)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-actions{display:flex;gap:8px;margin-top:16px}
.btn-save{flex:1;padding:10px;border:none;border-radius:var(--radius);background:var(--green);color:#fff;font-size:14px;font-weight:500;cursor:pointer}
.btn-save:disabled{opacity:0.5;cursor:not-allowed}
.btn-cancel{padding:10px 16px;border:1px solid var(--gray-200);border-radius:var(--radius);background:#fff;color:var(--gray-700);font-size:14px;cursor:pointer}
.btn-delete{padding:10px 14px;border:1px solid #FECACA;border-radius:var(--radius);background:#FEF2F2;color:var(--red);font-size:14px;cursor:pointer}
.detail-row{display:flex;gap:10px;margin-bottom:10px;font-size:13px}
.detail-label{color:var(--gray-400);min-width:72px;font-size:12px}
.detail-val{color:var(--gray-900);font-weight:500}
.badge-confirmed{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;background:var(--green-light);color:var(--green-dark)}
.stylist-bar{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap}
.stylist-chip{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;color:#fff;cursor:pointer;opacity:0.35;transition:opacity 0.15s}
.stylist-chip.active{opacity:1}
.stylist-chip.judy{background:var(--judy)}.stylist-chip.mark{background:var(--mark)}.stylist-chip.andrea{background:var(--andrea)}.stylist-chip.nicole{background:var(--nicole)}.stylist-chip.all{background:var(--gray-700)}
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-mark">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><path d="M8 2v4M16 2v4M3 10h18M5 4h14a2 2 0 012 2v14a2 2 0 01-2 2H5a2 2 0 01-2-2V6a2 2 0 012-2z"/></svg>
    </div>
    <div>
      <div class="logo-text">Zara's Appointment Book</div>
      <div class="logo-sub">Zara Never Sleeps</div>
    </div>
  </div>
  <div class="status-pill">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">Connecting...</span>
  </div>
</header>
<main>
  <div class="toolbar">
    <div class="week-nav">
      <button class="btn btn-icon" onclick="changeWeek(-1)">&#8249;</button>
      <div class="week-label" id="week-label"></div>
      <button class="btn btn-icon" onclick="changeWeek(1)">&#8250;</button>
      <button class="btn" onclick="changeWeek(0)">Today</button>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--judy)"></div>Judy</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--mark)"></div>Mark</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--andrea)"></div>Andrea</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--nicole)"></div>Nicole</div>
    </div>
  </div>
  <div class="stylist-bar">
    <div class="stylist-chip all active" onclick="filterStylist('all',this)">All stylists</div>
    <div class="stylist-chip judy" onclick="filterStylist('judy',this)">Judy</div>
    <div class="stylist-chip mark" onclick="filterStylist('mark',this)">Mark</div>
    <div class="stylist-chip andrea" onclick="filterStylist('andrea',this)">Andrea</div>
    <div class="stylist-chip nicole" onclick="filterStylist('nicole',this)">Nicole</div>
  </div>
  <div class="grid-wrap">
    <div class="cal-grid" id="cal-grid"></div>
  </div>
</main>
<div id="modal-root"></div>
<script>
const SUPABASE_URL='https://lpoeowwwccgpjxhdlxz.supabase.co';
const SUPABASE_KEY='sb_publishable_Xyuzgb-HYh47HJfGJ0Q6zw_hk-jZos4';
const sb=createClient(SUPABASE_URL,SUPABASE_KEY,{global:{headers:{'apikey':SUPABASE_KEY}}});
const STYLISTS=['Judy','Mark','Andrea','Nicole'];
const TIMES=['9:00 AM','9:30 AM','10:00 AM','10:30 AM','11:00 AM','11:30 AM','12:00 PM','12:30 PM','1:00 PM','1:30 PM','2:00 PM','2:30 PM','3:00 PM','3:30 PM','4:00 PM','4:30 PM'];
const DAYS=['Mon','Tue','Wed','Thu','Fri','Sat'];
const SERVICES=['Haircut','Colour','Blowout','Highlights','Trim','Treatment','Toning','Perm','Extensions'];
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS_LONG=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
let weekOffset=0,bookings=[],currentSlot=null,activeFilter='all';
function localStr(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function todayStr(){return localStr(new Date())}
function getWeekDates(o){
  const now=new Date(),day=now.getDay(),diff=day===0?-6:1-day;
  return Array.from({length:6},(_,i)=>{const d=new Date(now);d.setDate(now.getDate()+diff+i+o*7);return{str:localStr(d),num:d.getDate(),ms:d.toLocaleString('en-NZ',{month:'short'})}});
}
function setStatus(t,m){
  document.getElementById('status-dot').className='status-dot'+(t==='ok'?' ok':t==='err'?' err':'');
  document.getElementById('status-text').textContent=m;
}
async function fetchBookings(){
  const d=getWeekDates(weekOffset);
  const{data,error}=await sb.from('bookings').select('*').gte('booking_date',d[0].str).lte('booking_date',d[5].str).order('booking_date').order('booking_time');
  if(error){setStatus('err','Connection error: '+error.message);renderGrid();return;}
  bookings=data;
  setStatus('ok',`Live · ${bookings.length} booking${bookings.length!==1?'s':''} this week`);
  renderGrid();
}
function chipClass(s){if(!s)return'other';const x=s.toLowerCase();return['judy','mark','andrea','nicole'].includes(x)?x:'other'}
function visible(b){return activeFilter==='all'||(b.stylist||'').toLowerCase()===activeFilter}
function displayDate(ds){const[y,m,d]=ds.split('-').map(Number),j=new Date(y,m-1,d);return `${DAYS_LONG[j.getDay()]} ${d} ${MONTHS[m-1]}`}
function renderGrid(){
  const dates=getWeekDates(weekOffset),today=todayStr();
  document.getElementById('week-label').textContent=`${dates[0].num} ${dates[0].ms} - ${dates[5].num} ${dates[5].ms}`;
  let h=`<div class="corner-cell"></div>`;
  dates.forEach((d,i)=>{
    const c=bookings.filter(b=>b.booking_date===d.str&&visible(b)).length;
    h+=`<div class="day-header"><div class="day-name">${DAYS[i]}</div><div class="day-num${d.str===today?' today':''}">${d.num}</div><div class="day-count">${c>0?c+' booked':''}</div></div>`;
  });
  TIMES.forEach(t=>{
    const lunch=t==='12:00 PM'||t==='12:30 PM';
    h+=`<div class="time-cell">${t}</div>`;
    dates.forEach(d=>{
      if(lunch){h+=`<div class="slot lunch cell"><span>lunch</span></div>`;return}
      const b=bookings.find(b=>b.booking_date===d.str&&b.booking_time===t&&visible(b));
      if(b){const cl=chipClass(b.stylist);h+=`<div class="slot cell" onclick="showDetail(${b.id})"><div class="chip ${cl}"><div class="chip-name">${b.client_name||''}</div><div class="chip-sub">${b.stylist||''} - ${b.service||''}</div></div></div>`}
      else{h+=`<div class="slot cell" onclick="openBooking('${d.str}','${t}')"></div>`}
    });
  });
  document.getElementById('cal-grid').innerHTML=h;
}
function openBooking(ds,t){
  currentSlot={date:ds,time:t};
  document.getElementById('modal-root').innerHTML=`<div class="overlay" onclick="closeModal(event)"><div class="modal" onclick="event.stopPropagation()"><div class="modal-head"><div><div class="modal-title">New booking</div><div class="modal-sub">${displayDate(ds)} - ${t}</div></div><button class="close-btn" onclick="closeModal()">&times;</button></div><div class="two-col"><div class="field"><label>Client name</label><input id="f-name" placeholder="Full name"/></div><div class="field"><label>Phone</label><input id="f-phone" placeholder="021 000 0000"/></div></div><div class="field"><label>Email</label><input id="f-email" placeholder="optional"/></div><div class="two-col"><div class="field"><label>Stylist</label><select id="f-stylist">${STYLISTS.map(s=>`<option>${s}</option>`).join('')}</select></div><div class="field"><label>Service</label><select id="f-service">${SERVICES.map(s=>`<option>${s}</option>`).join('')}</select></div></div><div class="field"><label>Duration</label><select id="f-duration"><option value="30">30 min</option><option value="60" selected>60 min</option><option value="90">90 min</option><option value="120">120 min</option></select></div><div class="modal-actions"><button class="btn-cancel" onclick="closeModal()">Cancel</button><button class="btn-save" id="save-btn" onclick="saveBooking()">Save booking</button></div></div></div>`;
  document.getElementById('f-name').focus();
}
function showDetail(id){
  const b=bookings.find(x=>x.id===id);if(!b)return;
  const cl=chipClass(b.stylist);
  document.getElementById('modal-root').innerHTML=`<div class="overlay" onclick="closeModal(event)"><div class="modal" onclick="event.stopPropagation()"><div class="modal-head"><div><div class="modal-title">${b.client_name||'Booking'}</div><div class="modal-sub">${displayDate(b.booking_date)} - ${b.booking_time}</div></div><button class="close-btn" onclick="closeModal()">&times;</button></div><div style="margin-bottom:14px"><span style="display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;color:#fff;background:var(--${cl==='other'?'green':cl})">${b.stylist||'Stylist'}</span> <span class="badge-confirmed">${b.status||'confirmed'}</span></div><div class="detail-row"><span class="detail-label">Service</span><span class="detail-val">${b.service||'—'}</span></div><div class="detail-row"><span class="detail-label">Duration</span><span class="detail-val">${b.duration||'—'} min</span></div><div class="detail-row"><span class="detail-label">Phone</span><span class="detail-val">${b.client_phone||'—'}</span></div><div class="detail-row"><span class="detail-label">Email</span><span class="detail-val">${b.client_email||'—'}</span></div><div class="modal-actions"><button class="btn-delete" onclick="deleteBooking(${b.id})">Delete</button><button class="btn-cancel" onclick="closeModal()">Close</button></div></div></div>`;
}
async function saveBooking(){
  const btn=document.getElementById('save-btn'),name=document.getElementById('f-name').value.trim();
  if(!name){document.getElementById('f-name').focus();return}
  btn.disabled=true;btn.textContent='Saving...';
  const{error}=await sb.from('bookings').insert({client_name:name,client_phone:document.getElementById('f-phone').value.trim(),client_email:document.getElementById('f-email').value.trim(),stylist:document.getElementById('f-stylist').value,service:document.getElementById('f-service').value,duration:parseInt(document.getElementById('f-duration').value),booking_date:currentSlot.date,booking_time:currentSlot.time,status:'confirmed'});
  if(error){alert('Save failed: '+error.message);btn.disabled=false;btn.textContent='Save booking';return}
  closeModal();await fetchBookings();
}
async function deleteBooking(id){
  if(!confirm('Delete this booking?'))return;
  const{error}=await sb.from('bookings').delete().eq('id',id);
  if(error){alert('Delete failed: '+error.message);return}
  closeModal();await fetchBookings();
}
function closeModal(e){if(e&&e.target!==e.currentTarget)return;document.getElementById('modal-root').innerHTML=''}
function changeWeek(d){weekOffset=d===0?0:weekOffset+d;fetchBookings()}
function filterStylist(n,el){activeFilter=n;document.querySelectorAll('.stylist-chip').forEach(c=>c.classList.remove('active'));el.classList.add('active');renderGrid()}
fetchBookings();
</script>
</body>
</html>
